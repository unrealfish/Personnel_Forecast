
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星演</title>
    <style>
        :root {
            --primary-color: #1f1f1f;
            --primary-hover: #000000;
            --light-bg: #eef1f5;
            --white-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(60, 60, 67, 0.16);
            --success-color: #30d158;
            --warning-color: #ff9f0a;
            --surface-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
            --btn-bg: #7b8088;
            --btn-hover: #6d727a;
            --btn-text: #fff;
            --btn-muted: #f4f4f4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif; background: radial-gradient(circle at 10% 20%, #f6f8fb, #e9edf3 60%, #e3e8f0); overflow: hidden; color: #1d1d1f; }
        
        .top-navbar { height: 56px; background: rgba(255,255,255,0.74); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border-color); box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset; }
        .nav-left { display: flex; align-items: center; gap: 12px; }
        .window-controls { display: flex; align-items: center; gap: 8px; }
        .window-dot { width: 12px; height: 12px; border-radius: 50%; background: #b6bcc6; border: 1px solid #a7aebb; box-shadow: inset 0 1px 0 rgba(255,255,255,0.35); }
        .window-dot.red { background: #b6bcc6; }
        .window-dot.yellow { background: #b6bcc6; }
        .window-dot.green { background: #b6bcc6; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: #1d1d1f; }
        .nav-version { font-size: 12px; color: #9aa0aa; letter-spacing: 0.2px; }
        .logo-icon { width: 34px; height: 34px; background: linear-gradient(145deg, #6ab7ff, var(--primary-color)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; box-shadow: 0 6px 14px rgba(10,132,255,0.25); }
        
        .main-container { display: flex; height: calc(100vh - 56px); }
        .left-sidebar { width: 280px; min-width: 220px; max-width: 560px; background: var(--white-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; backdrop-filter: blur(12px); flex: 0 0 auto; resize: horizontal; overflow: auto; }
        
        .input-section { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .form-label { font-size: 12px; color: #666; margin-bottom: 8px; display: block; }
        .form-textarea { width: 100%; height: 100px; background: rgba(255,255,255,0.92); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px; font-size: 13px; resize: none; font-family: inherit; }
        .form-textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(10,132,255,0.16); }
        
        .btn-build { width: 100%; margin-top: 12px; padding: 10px; background: var(--btn-bg); border: 1px solid #6d727a; border-radius: 9999px; color: var(--btn-text); font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(75,85,99,0.22); }
        .btn-build:hover { background: var(--btn-hover); }
        .btn-build:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 8px; margin-top: 8px; }
        .btn-build-sm { flex: 1; padding: 8px; font-size: 12px; }
        .btn-example { background: var(--btn-bg); }
        .btn-optimize { background: var(--btn-bg); }
        .btn-optimize:hover { background: var(--btn-hover); }
        .btn-import { background: var(--btn-bg); }
        .btn-export { background: var(--btn-bg); }
        .btn-export:hover { background: var(--btn-hover); }
        
        .prompt-section { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .prompt-textarea { width: 100%; height: 60px; background: rgba(255,255,255,0.92); border: 1px solid var(--border-color); border-radius: 10px; padding: 8px; font-size: 12px; resize: none; font-family: inherit; }
        .sim-section { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .sim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .sim-input { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 12px; }
        .sim-hint { font-size: 11px; color: #666; margin: 6px 0; line-height: 1.5; }
        .sim-events { width: 100%; min-height: 66px; background: rgba(255,255,255,0.92); border: 1px solid var(--border-color); border-radius: 10px; padding: 8px; font-size: 12px; resize: vertical; font-family: inherit; }
        .recommend-list { margin-top: 8px; padding: 8px; border-radius: 10px; background: rgba(239,246,255,0.9); border: 1px dashed rgba(10,132,255,0.4); }
        .recommend-list li { margin-left: 16px; font-size: 11px; color: #4a4a4a; line-height: 1.5; }
        
        .graph-container { flex: 1; display: flex; flex-direction: column; background: var(--light-bg); position: relative; }
        .graph-header { min-height: 50px; background: var(--white-bg); display: flex; align-items: center; justify-content: space-between; padding: 6px 16px; border-bottom: 1px solid var(--border-color); }
        .graph-title { font-size: 14px; color: #666; }
        .graph-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        .btn-icon { padding: 6px 12px; border-radius: 9999px; background: rgba(255,255,255,0.95); border: 1px solid var(--border-color); cursor: pointer; font-size: 12px; color: #1d1d1f; }
        .btn-icon:hover { border-color: #000; color: #000; }
        
        .graph-area { flex: 1; position: relative; background: linear-gradient(180deg, #f8f9fc, #eff2f7); min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
        .graph-area.bg-gray { background: linear-gradient(180deg, #f8f9fc, #eff2f7); }
        .graph-area.bg-white { background: #ffffff; }
        .graph-area.bg-grid { background-color: #ffffff; background-image: linear-gradient(rgba(60,60,67,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(60,60,67,0.08) 1px, transparent 1px); background-size: 20px 20px; }
        .graph-area.bg-outlet { background-color: #f8fbff; background-image: radial-gradient(circle at 2px 2px, rgba(44, 99, 164, 0.24) 1.5px, transparent 1.5px); background-size: 20px 20px; }
        .graph-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #666; }
        
        .legend { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); border-radius: 12px; padding: 12px; font-size: 11px; box-shadow: var(--surface-shadow); border: 1px solid var(--border-color); }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }
        
        /* 实体详情卡片 */
        .entity-detail { 
            position: absolute; top: 20px; left: 20px; width: 280px; 
            background: rgba(255,255,255,0.92); border-radius: 12px; padding: 16px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.15); display: none; z-index: 100;
        }
        .entity-detail.show { display: block; }
        .entity-detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .entity-detail-name { font-size: 16px; font-weight: bold; color: var(--primary-color); }
        .entity-detail-close { cursor: pointer; font-size: 18px; color: #999; }
        .entity-detail-type { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #e8f5e9; color: #2e7d32; margin-bottom: 8px; }
        .entity-detail-desc { font-size: 12px; color: #666; line-height: 1.6; }
        .entity-detail-relations { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
        .entity-detail-relations h4 { font-size: 12px; color: #666; margin-bottom: 8px; }
        .entity-detail-relation { font-size: 11px; color: #666; padding: 4px 0; }
        
        .right-panel { width: 300px; min-width: 220px; max-width: 600px; background: rgba(250,250,252,0.86); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; backdrop-filter: blur(10px); flex: 0 0 auto; resize: horizontal; overflow: auto; }
        .people-panel { width: 280px; min-width: 220px; max-width: 600px; background: rgba(250,250,252,0.86); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; backdrop-filter: blur(10px); flex: 0 0 auto; resize: horizontal; overflow: auto; }
        .reasoning-panel { width: 340px; min-width: 260px; max-width: 680px; background: rgba(246,249,255,0.88); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; backdrop-filter: blur(10px); flex: 0 0 auto; resize: horizontal; overflow: auto; }
        .reasoning-header { padding: 12px 14px; border-bottom: 1px solid var(--border-color); background: #fff; display:flex; align-items:center; justify-content:space-between; }
        .reasoning-waterfall { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .reasoning-card { background: rgba(255,255,255,0.96); border: 1px solid #b5b5b5; border-radius: 12px; padding: 10px; box-shadow: 0 6px 14px rgba(0,0,0,0.08); }
        .reasoning-card.card-a { border: 3px solid #202020; }
        .reasoning-card.card-b { border: 1px solid #777; }
        .reasoning-card.card-c { border: 1px solid #bbb; border-left: 4px solid #111; }
        .reasoning-card.card-d { border: 1px solid #bbb; border-right: 4px solid #111; }
        .reasoning-card-meta { font-size: 11px; color: #444; margin-bottom: 8px; }
        .reasoning-card-grid { display: flex; flex-direction: column; }
        .reasoning-card-row { display: grid; grid-template-columns: 76px 1fr; gap: 8px; align-items: start; padding: 8px 0; border-top: 1px solid #eee; }
        .reasoning-card-row:first-child { border-top: none; padding-top: 0; }
        .reasoning-card-key { font-size: 11px; color: #666; font-weight: 600; }
        .reasoning-card-value { font-size: 12px; color: #222; line-height: 1.5; white-space: pre-wrap; }
        .reasoning-card-text { font-size: 12px; color: #222; line-height: 1.5; white-space: pre-wrap; }
        .panel-section { padding: 16px; border-bottom: 1px solid var(--border-color); background: rgba(255,255,255,0.75); }
        .panel-title { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 12px; }
        .collapse-bar { padding: 8px; border-bottom: 1px solid var(--border-color); background: #fff; display: flex; justify-content: flex-end; }
        .btn-collapse { width: 100%; padding: 6px; border: 1px solid #727880; border-radius: 9999px; background: #8a9098; cursor: pointer; font-size: 12px; color: #fff; }
        .btn-collapse:hover { background: #757b84; }
        .sim-round-list { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
        .sim-round-card { border: 1px solid rgba(10,132,255,0.2); border-radius: 10px; background: rgba(255,255,255,0.92); padding: 8px; }
        .sim-round-title { font-size: 12px; font-weight: 600; color: #2e5fa8; margin-bottom: 6px; }
        .sim-round-item { font-size: 11px; color: #555; margin-bottom: 4px; }
        .report-section { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .report-checkbox { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; color: #555; }
        .report-view { flex: 1; min-height: 0; overflow-y: auto; padding: 20px; background: rgba(255,255,255,0.92); }
        .report-empty { color: #666; font-size: 13px; line-height: 1.7; max-width: 760px; margin: 24px auto; background: rgba(248,249,252,0.9); border: 1px dashed var(--border-color); border-radius: 12px; padding: 16px; }
        .report-series { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
        .report-card { background: #fff; border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 8px 20px rgba(15,23,42,0.08); overflow: hidden; }
        .report-card-header { padding: 12px 14px; border-bottom: 1px solid #eee; }
        .report-card-title { font-size: 15px; font-weight: 700; color: #222; }
        .report-card-meta { margin-top: 4px; font-size: 11px; color: #666; }
        .report-card-content { padding: 14px; font-size: 13px; line-height: 1.75; color: #2d2d2d; }
        .report-card-content h1, .report-card-content h2, .report-card-content h3, .report-card-content h4 { margin: 10px 0 6px; line-height: 1.4; }
        .report-card-content p { margin: 0 0 10px; }
        .report-card-content ul, .report-card-content ol { margin: 0 0 10px 20px; }
        .report-card-content li { margin-bottom: 4px; }
        .report-card-content blockquote { margin: 0 0 10px; padding: 8px 12px; border-left: 3px solid #d0d7de; background: #f6f8fa; color: #444; }
        .report-card-content pre { margin: 0 0 10px; padding: 10px; border-radius: 8px; background: #f6f8fa; overflow-x: auto; }
        .report-card-content code { font-family: SFMono-Regular, Menlo, monospace; background: rgba(175,184,193,0.2); padding: 1px 4px; border-radius: 4px; }
        .report-card-content pre code { background: transparent; padding: 0; }

        .view-switch { display: flex; gap: 8px; }
        .view-switch .btn-icon.active { background: #2d333b; color: #fff; border-color: #2d333b; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-card { background: rgba(255,255,255,0.92); padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 6px 12px rgba(30,41,59,0.08); }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--primary-color); }
        .stat-label { font-size: 11px; color: #666; margin-top: 4px; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { padding: 4px 10px; border-radius: 12px; font-size: 11px; }
        .tag.entity { background: #e8f5e9; color: #2e7d32; }
        .tag.relation { background: #fff3e0; color: #e65100; }
        

        .people-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .agent-list { display: flex; flex-direction: column; gap: 8px; flex: 1; min-height: 0; overflow-y: auto; }
        .agent-card { border: 1px solid rgba(10,132,255,0.22); border-radius: 10px; padding: 8px; background: rgba(255,255,255,0.92); cursor: pointer; }
        .agent-card-name { font-size: 12px; font-weight: 600; color: #1f3b66; margin-bottom: 4px; }
        .agent-card-line { font-size: 11px; color: #555; line-height: 1.45; margin-bottom: 2px; }
        .agent-card-intro { font-size: 11px; color: #555; line-height: 1.5; max-height: 84px; overflow-y: auto; padding-right: 4px; white-space: pre-wrap; word-break: break-word; }

        .agent-card.glow-speech { border-color: rgba(48,209,88,0.9); box-shadow: 0 0 0 1px rgba(48,209,88,0.6), 0 0 18px rgba(48,209,88,0.45); }
        .agent-card.glow-action { border-color: rgba(255,69,58,0.9); box-shadow: 0 0 0 1px rgba(255,69,58,0.6), 0 0 18px rgba(255,69,58,0.45); }
        .agent-panel-toggle { margin-bottom: 8px; }
        .log-panel { flex: 1; background: rgba(255,255,255,0.75); display: flex; flex-direction: column; min-height: 100px; }
        .log-header { height: 36px; background: rgba(248,249,252,0.85); display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border-color); }
        .log-title { font-size: 12px; color: #666; }
        .log-content { flex: 1; overflow-y: auto; padding: 8px 16px; font-family: SFMono-Regular, Menlo, monospace; font-size: 11px; background: rgba(250,250,252,0.85); }
        .log-entry { padding: 2px 0; }
        .log-entry .time { color: #999; margin-right: 8px; }
        .log-entry.info .message { color: #1976d2; }
        .log-entry.success .message { color: #2e7d32; }
        .log-entry.warning .message { color: #f57c00; }
        .log-entry.processing .message { color: #7b1fa2; }
        

        .btn-minimized { padding: 6px 12px; border-radius: 9999px; background: #8a9098; border: 1px solid #727880; cursor: pointer; font-size: 12px; color: #fff; box-shadow: 0 6px 14px rgba(15,23,42,0.12); }
        .btn-minimized:hover { background: #757b84; border-color: #666c74; color: #fff; }

        
        .panel-resizer {
            width: 8px;
            cursor: col-resize;
            background: rgba(120, 128, 138, 0.14);
            border-left: 1px solid rgba(114, 120, 128, 0.28);
            border-right: 1px solid rgba(114, 120, 128, 0.28);
            transition: background .15s ease;
            flex: 0 0 8px;
        }
        .panel-resizer:hover, .panel-resizer.dragging { background: rgba(120, 128, 138, 0.32); }

        .hidden-input { display: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <input type="file" id="import-file" class="hidden-input" accept=".json">
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="graph_schema.js"></script>
    <script src="llm_provider.js"></script>
    <script>
        const state = {
            graphData: { nodes: [], links: [] },
            stats: { entities: 0, relations: 0, schemas: 0 },
            entityTypes: [],
            relationTypes: [],
            logs: [],
            inputText: '',
            customPrompt: '',
            isBuilding: false,
            buildStep: '',
            selectedEntity: null,
            simConfig: {
                envReady: false,
                rounds: 2,
                duration: 30,
                parallelCount: 1,
                eventsInput: '',
                recommendedRounds: 2,
                recommendedDuration: 30,
                recommendedEvents: []
            },
            expansionConfig: {
                rounds: 1,
                parallelCount: 1
            },
            reportConfig: {
                topic: '',
                style: '',
                includeGodView: false,
                mode: 'graph',
                isGenerating: false,
                seriesTitle: '',
                reports: []
            },
            reasoningCards: [],
            roundRecords: [],
            currentSimRun: null,
            agentActivity: {},
            agentActivityTTL: 5000,
            agentActivityCleanupTimer: null,
            llmConfig: {
                provider: 'minimax',
                model: 'MiniMax-M2.5',
                baseUrl: 'https://api.minimaxi.com',
                apiKey: '',
                temperature: 0.3
            },
            ui: {
                rightPanelCollapsed: false,
                peoplePanelCollapsed: false,
                reasoningPanelCollapsed: false,
                simulationCollapsed: false,
                graphBackground: 'gray',
                panelWidths: {
                    leftSidebar: 280,
                    rightPanel: 300,
                    peoplePanel: 280,
                    reasoningPanel: 340
                }
            }
        };
        
        const typeColors = KG_SCHEMA.typeColors;
        const typeGroups = KG_SCHEMA.typeGroups;
        const entityTypeColors = KG_SCHEMA.entityTypeColors;
        const relationColors = KG_SCHEMA.relationColors;
        const SCHEMA_ENTITY_TYPES = (KG_SCHEMA.ENTITY_TYPES || []).filter(item => item.name !== '其他').map(item => item.name);
        const SCHEMA_RELATION_TYPES = (KG_SCHEMA.RELATION_TYPES || []).map(item => item.name);

        function getSchemaPromptBlock(detail = false) {
            const entityPart = detail
                ? `【实体类型 - 节点类别】
${KG_SCHEMA.entityTypeDescriptions}`
                : `【实体类型】${SCHEMA_ENTITY_TYPES.join('、')}`;
            const relationPart = detail
                ? `【关系类型 - 边语义】
${KG_SCHEMA.relationTypeDescriptions}`
                : `【关系类型】${SCHEMA_RELATION_TYPES.join('、')}`;
            return `${entityPart}

${relationPart}`;
        }

        function getSchemaOutputRules() {
            return `必须严格使用上述实体类型与关系类型；不得创造未定义类型。输出 JSON 必须为：{ "entities": [{id, name, type, description}], "relations": [{source, target, relation}] }。`;
        }

        let showType = true, simulation = null;
        const GROUP_KEYS = ['人物', '人物属性', '资产/财务', '休闲方式', '内心', '关系事件', '地点', '其他'];
        const groupVisibility = GROUP_KEYS.reduce((acc, group) => { acc[group] = true; return acc; }, {});
        function getMergedLlmConfig() {
            const provider = state.llmConfig?.provider || 'minimax';
            const defaults = window.UnifiedLLMClient?.getDefaultConfig
                ? window.UnifiedLLMClient.getDefaultConfig(provider)
                : {};
            return {
                ...defaults,
                ...(state.llmConfig || {}),
                provider
            };
        }
        
        async function callLLMWithSystem(systemPrompt, prompt, temperature = 0.3) {
            try {
                if (!window.UnifiedLLMClient?.chat) {
                    addLog('LLM 客户端未加载（llm_provider.js）', 'error');
                    return null;
                }
                const cfg = getMergedLlmConfig();
                return await window.UnifiedLLMClient.chat({
                    ...cfg,
                    systemPrompt,
                    prompt,
                    temperature
                });
            } catch (e) {
                console.error('API Error:', e);
                addLog(`LLM调用失败: ${e.message || '未知错误'}`, 'error');
                return null;
            }
        }

        function onLlmProviderChange(provider) {
            const defaults = window.UnifiedLLMClient?.getDefaultConfig
                ? window.UnifiedLLMClient.getDefaultConfig(provider)
                : { provider };
            state.llmConfig = {
                ...defaults,
                apiKey: state.llmConfig.apiKey || ''
            };
            render();
        }

        function onLlmConfigInput(key, value) {
            const normalizedValue = key === 'temperature' ? Number(value) : value;
            state.llmConfig = {
                ...(state.llmConfig || {}),
                [key]: normalizedValue
            };
        }

        async function callLLM(prompt) {
            return callLLMWithSystem('你是一个专业的知识图谱抽取助手。请从文本中提取实体和关系，返回JSON格式。', prompt, 0.3);
        }

        function safeParseJson(text, fallback = null) {
            if (!text) return fallback;
            const jsonStr = text.match(/\{[\s\S]*\}/)?.[0] || text;
            try {
                return JSON.parse(jsonStr);
            } catch (_err) {
                return fallback;
            }
        }

        function addLog(msg, type = 'info') {
            state.logs = [...state.logs.slice(-30), { time: new Date().toLocaleTimeString(), message: msg, type }];
            renderLogs();
        }
        
        function renderLogs() {
            const logContent = document.getElementById('log-content');
            if (logContent) {

        function escapeHtml(text) {
            return String(text ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseInlineMarkdown(text) {
            let html = escapeHtml(text || '');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            return html;
        }

        function markdownToHtml(markdown = '') {
            const lines = String(markdown || '').replace(/\r/g, '').split('\n');
            const html = [];
            let inUl = false;
            let inOl = false;
            let inCode = false;

            const closeLists = () => {
                if (inUl) { html.push('</ul>'); inUl = false; }
                if (inOl) { html.push('</ol>'); inOl = false; }
            };

            lines.forEach(line => {
                if (line.trim().startsWith('```')) {
                    closeLists();
                    if (!inCode) {
                        inCode = true;
                        html.push('<pre><code>');
                    } else {
                        inCode = false;
                        html.push('</code></pre>');
                    }
                    return;
                }

                if (inCode) {
                    html.push(`${escapeHtml(line)}\n`);
                    return;
                }

                if (!line.trim()) {
                    closeLists();
                    return;
                }

                const heading = line.match(/^(#{1,4})\s+(.*)$/);
                if (heading) {
                    closeLists();
                    const level = heading[1].length;
                    html.push(`<h${level}>${parseInlineMarkdown(heading[2])}</h${level}>`);
                    return;
                }

                const blockquote = line.match(/^>\s?(.*)$/);
                if (blockquote) {
                    closeLists();
                    html.push(`<blockquote>${parseInlineMarkdown(blockquote[1])}</blockquote>`);
                    return;
                }

                const ul = line.match(/^[-*]\s+(.*)$/);
                if (ul) {
                    if (inOl) { html.push('</ol>'); inOl = false; }
                    if (!inUl) { html.push('<ul>'); inUl = true; }
                    html.push(`<li>${parseInlineMarkdown(ul[1])}</li>`);
                    return;
                }

                const ol = line.match(/^\d+\.\s+(.*)$/);
                if (ol) {
                    if (inUl) { html.push('</ul>'); inUl = false; }
                    if (!inOl) { html.push('<ol>'); inOl = true; }
                    html.push(`<li>${parseInlineMarkdown(ol[1])}</li>`);
                    return;
                }

                closeLists();
                html.push(`<p>${parseInlineMarkdown(line)}</p>`);
            });

            closeLists();
            if (inCode) html.push('</code></pre>');
            return html.join('');
        }

        function inferAgentSignalFromEvent(evt) {
            const behavior = `${evt?.action?.external_behavior || ''} ${evt?.action?.internal_thought || ''}`;
            const speechPattern = /说|聊|沟通|讨论|发言|回复|消息|私聊|群聊|告知|表达/;
            const actionPattern = /走|去|借|拿|给|转账|签|执行|行动|推进|处理|会面|拜访|协商|干预/;
            if (actionPattern.test(behavior) && !speechPattern.test(behavior)) return 'action';
            if (speechPattern.test(behavior)) return 'speech';
            return 'action';
        }

        function initPanelResizers() {
            document.querySelectorAll('.panel-resizer').forEach((resizer) => {
                resizer.onmousedown = (downEvent) => {
                    downEvent.preventDefault();
                    const targetKey = resizer.dataset.target;
                    const side = resizer.dataset.side || 'right';
                    const min = Number(resizer.dataset.min) || 180;
                    const max = Number(resizer.dataset.max) || 900;
                    const panelMap = {
                        leftSidebar: '.left-sidebar',
                        rightPanel: '.right-panel',
                        peoplePanel: '.people-panel',
                        reasoningPanel: '.reasoning-panel'
                    };
                    const panel = document.querySelector(panelMap[targetKey]);
                    if (!panel) return;

                    const startX = downEvent.clientX;
                    const startWidth = panel.getBoundingClientRect().width;
                    resizer.classList.add('dragging');

                    const onMove = (moveEvent) => {
                        const deltaX = moveEvent.clientX - startX;
                        const width = side === 'left' ? startWidth - deltaX : startWidth + deltaX;
                        const nextWidth = Math.max(min, Math.min(max, width));
                        panel.style.width = `${nextWidth}px`;
                        if (!state.ui.panelWidths) state.ui.panelWidths = {};
                        state.ui.panelWidths[targetKey] = Math.round(nextWidth);
                    };

                    const onUp = () => {
                        resizer.classList.remove('dragging');
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    };

                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                };
            });
        }

请进行以下优化：

特别注意：仅返回 JSON，不要有其他内容。`;

                    })).filter(r => r.source && r.target && r.relation);

                    addLog(`优化完成，实体 ${oldCount} → ${state.graphData.nodes.length}`, 'success');

        function mergeExpandedGraph(currentGraph, expandedGraph) {
            const existingNodes = Array.isArray(currentGraph?.nodes) ? currentGraph.nodes : [];
            const existingLinks = Array.isArray(currentGraph?.links) ? currentGraph.links : [];
            const incomingNodes = Array.isArray(expandedGraph?.entities) ? expandedGraph.entities : [];
            const incomingLinks = Array.isArray(expandedGraph?.relations) ? expandedGraph.relations : [];

            const normalizedNodes = existingNodes.map(node => ({ ...node }));
            const nodeKeyToId = new Map();
            normalizedNodes.forEach(node => {
                const key = `${String(node.name || '').trim()}::${String(node.type || '').trim()}`;
                if (key !== '::') nodeKeyToId.set(key, node.id);
            });

            let nextId = normalizedNodes.reduce((maxId, node) => Math.max(maxId, Number(node.id) || 0), 0) + 1;

            incomingNodes.forEach((node) => {
                const nodeName = String(node?.name || '').trim();
                const nodeType = SCHEMA_ENTITY_TYPES.includes(node?.type) ? node.type : '其他';
                if (!nodeName) return;
                const key = `${nodeName}::${nodeType}`;
                if (!nodeKeyToId.has(key)) {
                    nodeKeyToId.set(key, nextId);
                    normalizedNodes.push({
                        id: nextId,
                        name: nodeName,
                        type: nodeType,
                        description: String(node?.description || '').trim()
                    });
                    nextId += 1;
                    return;
                }

                const existingId = nodeKeyToId.get(key);
                const targetNode = normalizedNodes.find(item => item.id === existingId);
                if (targetNode && !targetNode.description && node?.description) {
                    targetNode.description = String(node.description).trim();
                }
            });

            const allLinks = [...existingLinks];
            const linkKeys = new Set(existingLinks.map(link => `${link.source}->${link.target}->${link.relation}`));

            incomingLinks.forEach((link) => {
                const relation = SCHEMA_RELATION_TYPES.includes(link?.relation) ? link.relation : null;
                if (!relation) return;
                const sourceType = SCHEMA_ENTITY_TYPES.includes(link?.sourceType) ? link.sourceType : null;
                const targetType = SCHEMA_ENTITY_TYPES.includes(link?.targetType) ? link.targetType : null;
                const sourceName = String(link?.source || '').trim();
                const targetName = String(link?.target || '').trim();
                if (!sourceName || !targetName) return;

                const sourceId = sourceType ? nodeKeyToId.get(`${sourceName}::${sourceType}`) : normalizedNodes.find(node => node.name === sourceName)?.id;
                const targetId = targetType ? nodeKeyToId.get(`${targetName}::${targetType}`) : normalizedNodes.find(node => node.name === targetName)?.id;
                if (!sourceId || !targetId) return;

                const key = `${sourceId}->${targetId}->${relation}`;
                if (linkKeys.has(key)) return;
                linkKeys.add(key);
                allLinks.push({ source: sourceId, target: targetId, relation });
            });

            return { nodes: normalizedNodes, links: allLinks };
        }

        function getPersonNeighborhoodGraph(personId) {
            const allNodes = Array.isArray(state.graphData?.nodes) ? state.graphData.nodes : [];
            const allLinks = Array.isArray(state.graphData?.links) ? state.graphData.links : [];
            const targetId = String(personId);

            const adjacentNodeIds = new Set([targetId]);
            const adjacentLinks = allLinks.filter((link) => {
                const sourceId = String(link?.source ?? '');
                const targetNodeId = String(link?.target ?? '');
                const isAdjacent = sourceId === targetId || targetNodeId === targetId;
                if (isAdjacent) {
                    adjacentNodeIds.add(sourceId);
                    adjacentNodeIds.add(targetNodeId);
                }
                return isAdjacent;
            });

            const adjacentNodes = allNodes.filter(node => adjacentNodeIds.has(String(node?.id ?? '')));
            return {
                entities: adjacentNodes,
                relations: adjacentLinks
            };
        }

        async function autoExpandSocialNetwork() {
            if (state.graphData.nodes.length === 0) {
                addLog('请先构建图谱，再进行自动扩充', 'info');
                return;
            }
            if (state.isBuilding) {
                addLog('正在处理中，请稍后再试', 'info');
                return;
            }

            const rounds = Math.max(1, Number(state.expansionConfig.rounds) || 1);
            const parallelCount = Math.max(1, Number(state.expansionConfig.parallelCount) || 1);
            const people = state.graphData.nodes.filter(node => node.type === '人物');
            if (people.length === 0) {
                addLog('图谱中暂无“人物”实体，无法执行人际网络扩充', 'warning');
                return;
            }

            const expandedPeople = new Set();
            state.isBuilding = true;
            state.buildStep = 'expand';
            render();

            try {
                for (let i = 1; i <= rounds; i += 1) {
                    const roundPeople = state.graphData.nodes
                        .filter(node => node.type === '人物')
                        .filter(node => !expandedPeople.has(String(node.id)));

                    if (roundPeople.length === 0) {
                        addLog(`第 ${i} 轮无需扩充：全部人物均已扩充完成`, 'info');
                        break;
                    }

                    addLog(`开始第 ${i} 轮人际网络扩充（共 ${rounds} 轮），待扩充人物 ${roundPeople.length} 位，并行数 ${parallelCount}`, 'processing');

                    let llmCallCount = 0;
                    for (let batchStart = 0; batchStart < roundPeople.length; batchStart += parallelCount) {
                        const batchPeople = roundPeople.slice(batchStart, batchStart + parallelCount);
                        const batchNo = Math.floor(batchStart / parallelCount) + 1;
                        addLog(`第 ${i} 轮第 ${batchNo} 批：并行扩充 ${batchPeople.length} 位人物`, 'processing');

                        const batchResults = await Promise.all(batchPeople.map(async (person, batchIndex) => {
                            const globalIndex = batchStart + batchIndex;
                            const neighborhood = getPersonNeighborhoodGraph(person.id);
                            addLog(`第 ${i} 轮：正在扩充人物 ${person.name}（${globalIndex + 1}/${roundPeople.length}）`, 'processing');

                            const prompt = `你是“人物关系脑补专家”。请在不与现有设定冲突的前提下，仅围绕指定人物扩充其人际网络与人物属性。

${getSchemaPromptBlock(false)}

${getSchemaOutputRules()}

扩充规则：
1. 本次只扩充 1 位人物，必须是：${JSON.stringify({ id: person.id, name: person.name, description: person.description || '' })}。
2. 你只能依据“目标人物及其相邻节点”信息进行补全，不要依赖全图上下文。
3. 必须至少新增 1 条该人物与“人物”之间的关系（可用：密友/朋友/同事/亲戚/熟人等）。
4. 必须至少新增 1 条该人物的属性关系（如：性格为/职业为/持有观点/渴求/爱好是等）。
5. 可以复用已有实体，也可以新增实体；但不得删除或篡改现有人物姓名。
6. 输出仅包含“本次新增”内容，避免重复已存在关系。
7. 所有 type 与 relation 必须严格来自 schema。

目标人物及其相邻节点子图：
${JSON.stringify(neighborhood)}

请仅返回 JSON：
{
  "entities": [{"name":"", "type":"", "description":""}],
  "relations": [{"source":"", "sourceType":"", "target":"", "targetType":"", "relation":""}]
}`;

                            llmCallCount += 1;
                            const result = await callLLM(prompt);
                            return { person, result, round: i, index: globalIndex };
                        }));

                        batchResults
                            .sort((a, b) => a.index - b.index)
                            .forEach(({ person, result, round }) => {
                                if (!result) {
                                    addLog(`第 ${round} 轮人物 ${person.name} 扩充失败：LLM 未返回内容`, 'warning');
                                    return;
                                }

                                try {
                                    const jsonStr = result.match(/\{[\s\S]*\}/)?.[0] || '{}';
                                    const parsed = JSON.parse(jsonStr);
                                    const prevNodeCount = state.graphData.nodes.length;
                                    const prevLinkCount = state.graphData.links.length;
                                    const merged = mergeExpandedGraph(state.graphData, parsed);

                                    state.graphData = merged;
                                    const expandedNode = state.graphData.nodes.find(node => String(node.id) === String(person.id));
                                    if (expandedNode) {
                                        expandedNode.expansionStatus = 'done';
                                        expandedNode.expandedByAI = true;
                                        expandedNode.expandedRound = round;
                                    }
                                    expandedPeople.add(String(person.id));
                                    updateStats(state.graphData);
                                    render();
                                    setTimeout(renderGraph, 100);

                                    addLog(`第 ${round} 轮人物 ${person.name} 扩充完成并已标记：新增实体 ${state.graphData.nodes.length - prevNodeCount}，新增关系 ${state.graphData.links.length - prevLinkCount}`, 'success');
                                } catch (e) {
                                    addLog(`第 ${round} 轮人物 ${person.name} 扩充失败：${e.message}`, 'warning');
                                }
                            });
                    }

                    addLog(`第 ${i} 轮人际网络扩充完成：已调用 ${llmCallCount} 次 LLM（并行数 ${parallelCount}）`, 'success');
                }
            } catch (e) {
                addLog('自动扩充出错: ' + e.message, 'warning');
            }

            state.isBuilding = false;
            state.buildStep = '';
            render();
            setTimeout(renderGraph, 100);
        }

        function importGraph(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (data.entities && data.relations) {
                        // 重新编号
                        const idMap = {};
                        state.graphData.nodes = data.entities.map((e, i) => {
                            idMap[e.id] = i + 1;
                            return { id: i + 1, name: e.name, type: e.type, description: e.description || '' };
                        });
                        
                        state.graphData.links = data.relations.map(r => ({
                            source: idMap[r.source] || r.source,
                            target: idMap[r.target] || r.target,
                            relation: r.relation
                        })).filter(r => r.source && r.target);
                        
                        state.entityTypes = [...new Set(state.graphData.nodes.map(e => e.type))];
                        state.relationTypes = [...new Set(state.graphData.links.map(r => r.relation).filter(Boolean))];
                        state.stats = { 
                            entities: state.graphData.nodes.length, 
                            relations: state.graphData.links.length, 
                            schemas: state.entityTypes.length + state.relationTypes.length 
                        };
                        
                        addLog(`导入成功：${state.graphData.nodes.length} 个实体，${state.graphData.links.length} 个关系`, 'success');
                        render();
                        setTimeout(renderGraph, 100);
                    } else {
                        addLog('文件格式不正确', 'error');
                    }
                } catch (err) {
                    addLog('解析文件失败: ' + err.message, 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        
        // 显示实体详情
        function showEntityDetail(entity) {
            state.selectedEntity = entity;
            
            // 查找相关关系
            const relations = state.graphData.links.filter(r => r.source === entity.id || r.target === entity.id);
            const relatedEntities = {};
            relations.forEach(r => {
                const otherId = r.source === entity.id ? r.target : r.source;
                const other = state.graphData.nodes.find(n => n.id === otherId);
                if (other) {
                    if (!relatedEntities[r.relation]) relatedEntities[r.relation] = [];
                    relatedEntities[r.relation].push(other);
                }
            });
            
            let relationsHtml = '';
            for (const [rel, ents] of Object.entries(relatedEntities)) {
                relationsHtml += `<div class="entity-detail-relations"><h4>${rel}</h4>${ents.map(e => `<div class="entity-detail-relation">→ ${e.name} (${e.type})</div>`).join('')}</div>`;
            }
            
            const detailHtml = `
                <div class="entity-detail show" id="entity-detail">
                    <div class="entity-detail-header">
                        <span class="entity-detail-name">${entity.name}</span>
                        <span class="entity-detail-close" onclick="hideEntityDetail()">×</span>
                    </div>
                    <span class="entity-detail-type">${entity.type}</span>
                    <div class="entity-detail-desc">${entity.description || '暂无描述信息'}</div>
                    ${relationsHtml}
                </div>
            `;
            
            // 移除旧的，添加新的
            const oldDetail = document.getElementById('entity-detail');
            if (oldDetail) oldDetail.remove();
            
            const graphArea = document.getElementById('graph-area');
            graphArea.insertAdjacentHTML('afterbegin', detailHtml);
        }

        function parseCustomEvents(text) {
            return (text || '')
                .split('\n')
                .map(line => line.trim())
                .filter(Boolean)
                .map((line, idx) => {
                    const [timePart, ...eventParts] = line.split(':');
                    const hasTime = eventParts.length > 0;
                    const eventText = hasTime ? eventParts.join(':').trim() : timePart.trim();
                    const timeNum = hasTime ? Number(timePart.trim()) : idx + 1;
                    return {
                        time: Number.isFinite(timeNum) && timeNum > 0 ? timeNum : idx + 1,
                        text: eventText || `用户事件${idx + 1}`
                    };
                });
        }

                pushReasoningCard({ message: `采访完成，素材条数：${materials.length}` }, null, 'trace');

                // Step 2: 主编基于主题+风格+素材，规划系列稿件要求
                const editorialPrompt = `你是主编Agent。请根据用户主题、文章风格与采访素材，决定产出稿件数量，并给每篇稿件制定细致要求。
只返回JSON：{seriesTitle, strategyReason, reports:[{title,focus,angle,outline:[...],mustInclude:[...]}]}
要求：
- reports长度1到3
- 每篇focus和angle必须不同
- mustInclude应引用素材中的关键信息点
主题:${topic}
文章风格:${style}
采访场景综述:${interviewData.sceneSummary || '无'}
关键线索:${JSON.stringify(interviewData.keyClues || [])}
采访素材:${JSON.stringify(materials)}`;
                const planRaw = await callLLMWithSystem('你是严格的主编Agent，只输出JSON。', editorialPrompt, 0.3);
                const plan = safeParseJson(planRaw, null);
                if (!plan || !Array.isArray(plan.reports) || !plan.reports.length) {
                    addLog('主编规划失败：未获取可用稿件计划', 'error');
                    state.reportConfig.isGenerating = false;
                    render();
                    return;
                }
                pushReasoningCard({ message: `主编完成选题，计划稿件数：${plan.reports.length}` }, null, 'trace');

                // Step 3: 撰稿人循环出稿（共用采访素材池）
                const draftOutputs = [];
                const materialDigest = formatInterviewDigest(materials.map(m => ({
                    agentName: m.agentName,
                    statement: m.statement,
                    innerThought: m.innerThought,
                    highlights: [...(m.highlights || []), ...(m.evidence || [])]
                })));

                for (let i = 0; i < plan.reports.length; i += 1) {
                    const item = plan.reports[i] || {};
                    const writerPrompt = `你是撰稿Agent。请按主编要求输出第${i + 1}篇稿件。
要求：
- 仅输出正文（Markdown格式）
- 风格必须严格符合：${style}
- 紧扣总主题：${topic}
- 本篇标题：${item.title || `稿件 ${i + 1}`}
- 本篇焦点：${item.focus || ''}
- 本篇角度：${item.angle || ''}
- 建议结构：${JSON.stringify(item.outline || [])}
- 必须覆盖信息点：${JSON.stringify(item.mustInclude || [])}
可用采访素材：
${materialDigest}
场景综述:${interviewData.sceneSummary || '无'}`;
                    const draft = await callLLMWithSystem('你是资深撰稿人，请输出中文Markdown稿件正文。', writerPrompt, 0.6);
                    draftOutputs.push({
                        title: item.title || `报告 ${i + 1}`,
                        focus: item.focus || '',
                        content: draft || '暂无内容',
                        interviewCount: materials.length
                    });
                    pushReasoningCard({ message: `第${i + 1}篇初稿完成：${item.title || `报告 ${i + 1}`}` }, null, 'trace');
                }

                // Step 4: 审稿人统一审阅所有稿件并修复问题
                const reviewPrompt = `你是审稿与发布Agent。请统一审阅以下全部稿件并修复问题后发布。
只返回JSON：{seriesTitle, editorSummary, reports:[{title,publishVersion,editorNote}]}
要求：
- reports数量与输入稿件一致
- publishVersion为最终发布稿（Markdown）
- 修复事实冲突、逻辑重复、风格不一致问题
总主题:${topic}
统一风格:${style}
初稿列表:${JSON.stringify(draftOutputs)}`;
                const reviewedRaw = await callLLMWithSystem('你是严格审稿Agent，只输出JSON。', reviewPrompt, 0.3);
                const reviewed = safeParseJson(reviewedRaw, null);

                let finalReports = draftOutputs.map((draft, idx) => ({
                    title: draft.title,
                    content: draft.content,
                    editorNote: '审稿回退：沿用初稿',
                    interviewCount: draft.interviewCount
                }));

                if (reviewed && Array.isArray(reviewed.reports) && reviewed.reports.length) {
                    finalReports = draftOutputs.map((draft, idx) => {
                        const rev = reviewed.reports[idx] || {};
                        return {
                            title: rev.title || draft.title,
                            content: rev.publishVersion || draft.content,
                            editorNote: rev.editorNote || reviewed.editorSummary || '系统自动发布',
                            interviewCount: draft.interviewCount
                        };
                    });
                }

                state.reportConfig.seriesTitle = plan.seriesTitle || reviewed?.seriesTitle || `${topic}报告`;
                state.reportConfig.reports = finalReports;
                state.reportConfig.mode = 'report';
                state.reportConfig.isGenerating = false;
                addLog(`报告生成完成，共 ${finalReports.length} 篇（采访→主编→撰稿→审稿）`, 'success');
                render();
            } catch (error) {
                console.error(error);
                addLog(`报告生成失败：${error?.message || '未知错误'}`, 'error');
                state.reportConfig.isGenerating = false;
                render();
            }
        }

        function renderGraph() {
            const container = document.getElementById('graph-area');
            const svg = d3.select('#graph-svg');
            const width = container.clientWidth, height = container.clientHeight;
            svg.attr('width', width).attr('height', height).selectAll('*').remove();
            
            // 移除旧的详情面板
            const oldDetail = document.getElementById('entity-detail');
            if (oldDetail) oldDetail.remove();
            
            if (state.graphData.nodes.length === 0) return;
            
            const g = svg.append('g');
            svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform)));
            
            const nodes = state.graphData.nodes
                .filter(shouldDisplayNode)
                .map(n => ({ ...n }));
            const links = state.graphData.links.map(l => ({
                source: nodes.find(n => n.id === l.source),
                target: nodes.find(n => n.id === l.target),
                relation: l.relation
            })).filter(l => l.source && l.target);

            if (nodes.length === 0) return;
            
            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(120))
                .force('charge', d3.forceManyBody().strength(-400))
                .force('center', d3.forceCenter(width/2, height/2))
                .force('collision', d3.forceCollide().radius(34));
            
            g.append('g').selectAll('line').data(links).enter().append('line')
                .attr('stroke', d => relationColors[d.relation] || '#555').attr('stroke-width', 2).attr('stroke-opacity', 0.6);
            
            g.append('g').selectAll('text.link-label').data(links).enter().append('text')
                .attr('class', 'link-label').text(d => d.relation).attr('font-size', 9).attr('fill', '#666');
            
            const node = g.append('g').selectAll('g').data(nodes).enter().append('g')
                .style('cursor', 'pointer')
                .on('click', (event, d) => showEntityDetail(d))
                .call(d3.drag()
                    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));
            
            node.append('circle').attr('r', showType ? 17 : 12)
                .attr('fill', d => entityTypeColors[typeGroups[d.type] || '其他'] || '#b2dfdb')
                .attr('stroke', d => {
                    const signal = getAgentSignal(d.id);
                    if (signal === 'speech') return '#30d158';
                    if (signal === 'action') return '#ff453a';
                    return '#666';
                })
                .attr('stroke-width', d => getAgentSignal(d.id) ? 3 : 2)
                .style('filter', d => {
                    const signal = getAgentSignal(d.id);
                    if (signal === 'speech') return 'drop-shadow(0 0 8px rgba(48,209,88,0.9))';
                    if (signal === 'action') return 'drop-shadow(0 0 8px rgba(255,69,58,0.9))';
                    return 'none';
                });
            
            node.append('text').text(d => d.name.length > 6 ? d.name.substring(0, 6) + '...' : d.name)
                .attr('font-size', 10).attr('fill', '#333').attr('text-anchor', 'middle').attr('dy', 40);
            
            if (showType) {
                node.append('text').text(d => d.type).attr('font-size', 8).attr('fill', '#666').attr('text-anchor', 'middle').attr('dy', 4);
            }
            
            simulation.on('tick', () => {
                g.selectAll('line').attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                g.selectAll('text.link-label').attr('x', d => (d.source.x + d.target.x) / 2).attr('y', d => (d.source.y + d.target.y) / 2);
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }

                                    <div class="stat-card"><div class="stat-value">${state.stats.relations}</div><div class="stat-label">关系</div></div>
                                    <div class="stat-card"><div class="stat-value">${state.stats.schemas}</div><div class="stat-label">类型</div></div>
                                </div>
                            </div>
                            <div class="panel-section"><div class="panel-title">实体类型</div><div class="tag-container">${et}</div></div>
                            <div class="panel-section"><div class="panel-title">关系类型</div><div class="tag-container">${rt}</div></div>
                            <div class="log-panel">
                                <div class="log-header"><span class="log-title">系统日志</span></div>
                                <div class="log-content" id="log-content">${state.logs.map(l => `<div class="log-entry ${l.type}"><span class="time">${l.time}</span><span class="message">${l.message}</span></div>`).join('')}</div>
                            </div>
                        </div>
                    `}
                    ${state.ui.peoplePanelCollapsed ? '' : `
                        <div class="panel-resizer" data-target="peoplePanel" data-side="left" data-min="220" data-max="600"></div>
                        <div class="people-panel" style="width:${state.ui.panelWidths.peoplePanel}px">
                            <div class="collapse-bar"><button class="btn-collapse" style="width:auto;padding:4px 10px" onclick="togglePeoplePanel()">最小化 人物列表面板</button></div>
                            <div class="panel-section people-section">
                                <div class="panel-title">人物列表（自主社交）</div>
                                <div class="btn-row agent-panel-toggle" style="flex-wrap:wrap">
                                    ${GROUP_KEYS.map(group => `<button class="btn-icon" style="flex:1 1 48%" onclick="toggleGroupVisibility('${group}')">${groupVisibility[group] ? `隐藏${group}` : `显示${group}`}</button>`).join('')}
                                </div>
                                ${renderAgentCardsHtml()}
                            </div>
                        </div>
                    `}
                    ${state.ui.reasoningPanelCollapsed ? '' : `
                        <div class="panel-resizer" data-target="reasoningPanel" data-side="left" data-min="260" data-max="680"></div>
                        <div class="reasoning-panel" style="width:${state.ui.panelWidths.reasoningPanel}px">
                            <div class="reasoning-header">
                                <span class="panel-title" style="margin:0">推演过程</span>
                                <button class="btn-collapse" style="width:auto;padding:4px 10px" onclick="toggleReasoningPanel()">最小化 推演过程面板</button>
                            </div>
                            <div class="reasoning-waterfall" id="reasoning-waterfall"></div>
                        </div>
                    `}
                </div>
            `;
            
            document.getElementById('input-text')?.addEventListener('input', e => state.inputText = e.target.value);
            document.getElementById('custom-prompt')?.addEventListener('input', e => state.customPrompt = e.target.value);
            document.getElementById('import-file')?.addEventListener('change', importGraph);
            renderReasoningCards();
            initPanelResizers();
            
            if (state.reportConfig.mode !== 'report' && state.graphData.nodes.length > 0 && (!state.isBuilding || state.buildStep === 'expand')) {
                setTimeout(renderGraph, 100);
            }
        }
        
        function toggleType() { showType = !showType; render(); if (state.graphData.nodes.length > 0) setTimeout(renderGraph, 100); }
        
        document.addEventListener('DOMContentLoaded', () => { render(); window.addEventListener('resize', () => state.graphData.nodes.length && renderGraph()); });
        window.extractGraph = extractGraph; 
        window.loadExample = loadExample; 
        window.toggleType = toggleType; 
        window.toggleGroupVisibility = toggleGroupVisibility;
        window.setGraphBackground = setGraphBackground;
        window.runOptimization = runOptimization;
        window.exportGraph = exportGraph;
        window.triggerImport = triggerImport;
        window.showEntityDetail = showEntityDetail;
        window.hideEntityDetail = hideEntityDetail;
        window.runSandboxSimulation = runSandboxSimulation;
        window.buildSimulationEnvironment = buildSimulationEnvironment;
        window.onSimConfigInput = onSimConfigInput;
        window.toggleRightPanel = toggleRightPanel;
        window.toggleSimulationPanel = toggleSimulationPanel;
        window.togglePeoplePanel = togglePeoplePanel;
        window.toggleReasoningPanel = toggleReasoningPanel;
        window.exportSimulationPackage = exportSimulationPackage;
        window.onExpansionParallelChange = onExpansionParallelChange;
        window.onReportTopicInput = onReportTopicInput;
        window.onReportStyleInput = onReportStyleInput;
        window.onReportGodViewToggle = onReportGodViewToggle;
        window.generateReportSeries = generateReportSeries;
        window.downloadReportMarkdown = downloadReportMarkdown;
        window.onLlmProviderChange = onLlmProviderChange;
        window.onLlmConfigInput = onLlmConfigInput;
    </script>
    <script src="multi_agent_sim.js"></script>
</body>
</html>
