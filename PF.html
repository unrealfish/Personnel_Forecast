
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星演</title>
    <style>
        :root {
            --primary-color: #1f1f1f;
            --primary-hover: #000000;
            --light-bg: #eef1f5;
            --white-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(60, 60, 67, 0.16);
            --success-color: #30d158;
            --warning-color: #ff9f0a;
            --surface-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
            --btn-bg: #1f1f1f;
            --btn-hover: #000;
            --btn-text: #fff;
            --btn-muted: #f4f4f4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif; background: radial-gradient(circle at 10% 20%, #f6f8fb, #e9edf3 60%, #e3e8f0); overflow: hidden; color: #1d1d1f; }
        
        .top-navbar { height: 56px; background: rgba(255,255,255,0.74); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border-color); box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset; }
        .window-controls { display: flex; align-items: center; gap: 8px; margin-right: 14px; }
        .window-dot { width: 12px; height: 12px; border-radius: 50%; }
        .window-dot.red { background: #ff5f57; }
        .window-dot.yellow { background: #febc2e; }
        .window-dot.green { background: #28c840; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: #1d1d1f; }
        .logo-icon { width: 34px; height: 34px; background: linear-gradient(145deg, #6ab7ff, var(--primary-color)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; box-shadow: 0 6px 14px rgba(10,132,255,0.25); }
        
        .main-container { display: flex; height: calc(100vh - 56px); }
        .left-sidebar { width: 280px; background: var(--white-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; backdrop-filter: blur(12px); }
        
        .input-section { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .form-label { font-size: 12px; color: #666; margin-bottom: 8px; display: block; }
        .form-textarea { width: 100%; height: 100px; background: rgba(255,255,255,0.92); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px; font-size: 13px; resize: none; font-family: inherit; }
        .form-textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(10,132,255,0.16); }
        
        .btn-build { width: 100%; margin-top: 12px; padding: 10px; background: var(--btn-bg); border: 1px solid #222; border-radius: 10px; color: var(--btn-text); font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.18); }
        .btn-build:hover { background: var(--btn-hover); }
        .btn-build:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 8px; margin-top: 8px; }
        .btn-build-sm { flex: 1; padding: 8px; font-size: 12px; }
        .btn-example { background: var(--btn-bg); }
        .btn-optimize { background: var(--btn-bg); }
        .btn-optimize:hover { background: var(--btn-hover); }
        .btn-import { background: var(--btn-bg); }
        .btn-export { background: var(--btn-bg); }
        .btn-export:hover { background: var(--btn-hover); }
        
        .prompt-section { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .prompt-textarea { width: 100%; height: 60px; background: rgba(255,255,255,0.92); border: 1px solid var(--border-color); border-radius: 10px; padding: 8px; font-size: 12px; resize: none; font-family: inherit; }
        .sim-section { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .sim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .sim-input { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 12px; }
        .sim-hint { font-size: 11px; color: #666; margin: 6px 0; line-height: 1.5; }
        .sim-events { width: 100%; min-height: 66px; background: rgba(255,255,255,0.92); border: 1px solid var(--border-color); border-radius: 10px; padding: 8px; font-size: 12px; resize: vertical; font-family: inherit; }
        .recommend-list { margin-top: 8px; padding: 8px; border-radius: 10px; background: rgba(239,246,255,0.9); border: 1px dashed rgba(10,132,255,0.4); }
        .recommend-list li { margin-left: 16px; font-size: 11px; color: #4a4a4a; line-height: 1.5; }
        
        .graph-container { flex: 1; display: flex; flex-direction: column; background: var(--light-bg); position: relative; }
        .graph-header { height: 50px; background: var(--white-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border-color); }
        .graph-title { font-size: 14px; color: #666; }
        .graph-actions { display: flex; gap: 8px; }
        .btn-icon { padding: 6px 12px; border-radius: 10px; background: rgba(255,255,255,0.95); border: 1px solid var(--border-color); cursor: pointer; font-size: 12px; color: #1d1d1f; }
        .btn-icon:hover { border-color: #000; color: #000; }
        
        .graph-area { flex: 1; position: relative; background: linear-gradient(180deg, #f8f9fc, #eff2f7); }
        .graph-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #666; }
        
        .legend { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.9); border-radius: 12px; padding: 12px; font-size: 11px; box-shadow: var(--surface-shadow); border: 1px solid var(--border-color); }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }
        
        /* 实体详情卡片 */
        .entity-detail { 
            position: absolute; top: 20px; left: 20px; width: 280px; 
            background: rgba(255,255,255,0.92); border-radius: 12px; padding: 16px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.15); display: none; z-index: 100;
        }
        .entity-detail.show { display: block; }
        .entity-detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .entity-detail-name { font-size: 16px; font-weight: bold; color: var(--primary-color); }
        .entity-detail-close { cursor: pointer; font-size: 18px; color: #999; }
        .entity-detail-type { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #e8f5e9; color: #2e7d32; margin-bottom: 8px; }
        .entity-detail-desc { font-size: 12px; color: #666; line-height: 1.6; }
        .entity-detail-relations { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
        .entity-detail-relations h4 { font-size: 12px; color: #666; margin-bottom: 8px; }
        .entity-detail-relation { font-size: 11px; color: #666; padding: 4px 0; }
        
        .right-panel { width: 300px; background: rgba(250,250,252,0.86); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        .right-panel.collapsed { width: 42px; min-width: 42px; overflow: hidden; }
        .reasoning-panel { width: 340px; min-width: 300px; background: rgba(246,249,255,0.88); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        .reasoning-header { padding: 12px 14px; border-bottom: 1px solid var(--border-color); background: #fff; display:flex; align-items:center; justify-content:space-between; }
        .reasoning-waterfall { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .reasoning-card { background: rgba(255,255,255,0.96); border: 1px solid #b5b5b5; border-radius: 12px; padding: 10px; box-shadow: 0 6px 14px rgba(0,0,0,0.08); }
        .reasoning-card.card-a { border: 3px solid #202020; }
        .reasoning-card.card-b { border: 1px solid #777; }
        .reasoning-card.card-c { border: 1px solid #bbb; border-left: 4px solid #111; }
        .reasoning-card.card-d { border: 1px solid #bbb; border-right: 4px solid #111; }
        .reasoning-card-meta { font-size: 11px; color: #444; margin-bottom: 6px; }
        .reasoning-card-text { font-size: 12px; color: #222; line-height: 1.5; white-space: pre-wrap; }
        .panel-section { padding: 16px; border-bottom: 1px solid var(--border-color); background: rgba(255,255,255,0.75); }
        .panel-title { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 12px; }
        .collapse-bar { padding: 8px; border-bottom: 1px solid var(--border-color); background: #fff; display: flex; justify-content: center; }
        .btn-collapse { width: 100%; padding: 6px; border: 1px solid var(--border-color); border-radius: 10px; background: rgba(255,255,255,0.9); cursor: pointer; font-size: 12px; }
        .sim-round-list { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
        .sim-round-card { border: 1px solid rgba(10,132,255,0.2); border-radius: 10px; background: rgba(255,255,255,0.92); padding: 8px; }
        .sim-round-title { font-size: 12px; font-weight: 600; color: #2e5fa8; margin-bottom: 6px; }
        .sim-round-item { font-size: 11px; color: #555; margin-bottom: 4px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-card { background: rgba(255,255,255,0.92); padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 6px 12px rgba(30,41,59,0.08); }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--primary-color); }
        .stat-label { font-size: 11px; color: #666; margin-top: 4px; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { padding: 4px 10px; border-radius: 12px; font-size: 11px; }
        .tag.entity { background: #e8f5e9; color: #2e7d32; }
        .tag.relation { background: #fff3e0; color: #e65100; }
        
        .log-panel { flex: 1; background: rgba(255,255,255,0.75); display: flex; flex-direction: column; min-height: 100px; }
        .log-header { height: 36px; background: rgba(248,249,252,0.85); display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border-color); }
        .log-title { font-size: 12px; color: #666; }
        .log-content { flex: 1; overflow-y: auto; padding: 8px 16px; font-family: SFMono-Regular, Menlo, monospace; font-size: 11px; background: rgba(250,250,252,0.85); }
        .log-entry { padding: 2px 0; }
        .log-entry .time { color: #999; margin-right: 8px; }
        .log-entry.info .message { color: #1976d2; }
        .log-entry.success .message { color: #2e7d32; }
        .log-entry.warning .message { color: #f57c00; }
        .log-entry.processing .message { color: #7b1fa2; }
        
        .hidden-input { display: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <input type="file" id="import-file" class="hidden-input" accept=".json">
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script>
        const state = {
            graphData: { nodes: [], links: [] },
            stats: { entities: 0, relations: 0, schemas: 0 },
            entityTypes: [],
            relationTypes: [],
            logs: [],
            inputText: '',
            customPrompt: '',
            isBuilding: false,
            buildStep: '',
            selectedEntity: null,
            simConfig: {
                envReady: false,
                rounds: 2,
                duration: 30,
                eventsInput: '',
                recommendedRounds: 2,
                recommendedDuration: 30,
                recommendedEvents: []
            },
            reasoningCards: [],
            roundRecords: [],
            currentSimRun: null,
            ui: {
                rightPanelCollapsed: false,
                simulationCollapsed: false
            }
        };
        
        const typeColors = {
            '人物': '#ffcdd2',           // 粉色
            'MBTI类型': '#b3e5fc',       // 浅蓝
            '星座': '#b3e5fc',
            '职业': '#b3e5fc',
            '学历': '#b3e5fc',
            '专业': '#b3e5fc',
            '家庭氛围': '#b3e5fc',
            '资产/财务': '#fff9c4',      // 浅黄
            '休闲方式': '#c8e6c9',       // 浅绿
            '价值观/观点': '#e1bee7',    // 浅紫
            '心理状态/创伤': '#e1bee7',
            '压力与焦虑': '#e1bee7',
            '核心需求': '#e1bee7',
            '关系事件': '#ffe0b2',       // 浅橙
            '地点': '#d7ccc8',           // 浅棕
            '其他': '#b2dfdb'            // 青色
        };
        
        // 实体类型分组
        const typeGroups = {
            '人物': '人物',
            'MBTI类型': '人物属性', '星座': '人物属性', '职业': '人物属性', '学历': '人物属性', '专业': '人物属性', '家庭氛围': '人物属性',
            '资产/财务': '资产/财务',
            '休闲方式': '休闲方式',
            '价值观/观点': '内心', '心理状态/创伤': '内心', '压力与焦虑': '内心', '核心需求': '内心',
            '关系事件': '关系事件',
            '地点': '地点',
            '其他': '其他'
        };
        
        // 实体类型颜色（按分组）
        const entityTypeColors = {
            '人物': '#ffcdd2',
            '人物属性': '#b3e5fc',
            '资产/财务': '#fff9c4',
            '休闲方式': '#c8e6c9',
            '内心': '#e1bee7',
            '关系事件': '#ffe0b2',
            '地点': '#d7ccc8',
            '其他': '#b2dfdb'
        };
        
        // 关系类型颜色
        const relationColors = {
            // 社会关系
            '情侣': '#e91e63', '密友': '#e91e63', '亲戚': '#e91e63', '夫妻': '#e91e63', '前任': '#e91e63', '父子': '#e91e63', '父女': '#e91e63', '母女': '#e91e63', '同事': '#e91e63',
            // 属性映射
            '性格为': '#2196f3', '属于星座': '#2196f3', '职业为': '#2196f3', '最高学历为': '#2196f3', '主修专业': '#2196f3', '成长于': '#2196f3', '持有资产': '#2196f3', '持有观点': '#2196f3', '面临压力': '#2196f3', '爱好是': '#2196f3', '渴求': '#2196f3',
            // 事件行为
            '参与事件': '#4caf50', '发生地': '#4caf50', '曾遭遇': '#4caf50', '关注/干预': '#4caf50', '推荐/建议': '#4caf50'
        };
        
        let showType = true, simulation = null;
        const API_KEY = 'sk-cp-A9z1o0km6DeGKloUzgRyIbeiWR40fji97-1Fz4jGS_McfYsojJiq6K0eJ_B_W6eCDKxBNNEpzBmTW4yKr8tMxJWIFmQ7Ss8xNJm31lEFH3PcmY5H_1dqG0U';
        const API_URL = 'https://api.minimaxi.com/v1/text/chatcompletion_v2';
        
        async function callLLM(prompt) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: 'MiniMax-M2.5', messages: [
                        { role: 'system', content: '你是一个专业的知识图谱抽取助手。请从文本中提取实体和关系，返回JSON格式。' },
                        { role: 'user', content: prompt }
                    ], temperature: 0.3 })
                });
                const data = await res.json();
                return data.choices?.[0]?.message?.content || null;
            } catch (e) { console.error('API Error:', e); return null; }
        }
        
        function addLog(msg, type = 'info') {
            state.logs = [...state.logs.slice(-30), { time: new Date().toLocaleTimeString(), message: msg, type }];
            renderLogs();
        }
        
        function renderLogs() {
            const logContent = document.getElementById('log-content');
            if (logContent) {
                logContent.innerHTML = state.logs.map(l => `<div class="log-entry ${l.type}"><span class="time">${l.time}</span><span class="message">${l.message}</span></div>`).join('');
                logContent.scrollTop = logContent.scrollHeight;
            }
        }

        function getSimRunFolderName() {
            const t = new Date();
            const pad = n => String(n).padStart(2, '0');
            return `simulation_${t.getFullYear()}${pad(t.getMonth() + 1)}${pad(t.getDate())}_${pad(t.getHours())}${pad(t.getMinutes())}${pad(t.getSeconds())}`;
        }

        function createRoundRecord(round, roundEvents = [], graphData = state.graphData) {
            return {
                round,
                timestamp: new Date().toISOString(),
                events: roundEvents.map((evt, idx) => ({
                    index: idx + 1,
                    channel: evt.channel,
                    initiatorId: evt.initiator_id,
                    receiverIds: evt.receiver_ids,
                    location: evt.location,
                    dialogue: evt.action?.external_behavior || '',
                    internalThought: evt.action?.internal_thought || '',
                    payload: evt.payload || {}
                })),
                graphStats: {
                    nodes: graphData?.nodes?.length || 0,
                    links: graphData?.links?.length || 0
                }
            };
        }

        function pushReasoningCard(text, round = null, type = 'trace') {
            state.reasoningCards = [...state.reasoningCards, {
                id: `rc_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`,
                time: new Date().toLocaleTimeString(),
                round,
                type,
                text
            }];
            if (state.reasoningCards.length > 300) {
                state.reasoningCards = state.reasoningCards.slice(-300);
            }
            renderReasoningCards();
        }

        function getReasoningCardClass(card) {
            if (card.type === 'round') return 'card-a';
            if (card.type === 'system') return 'card-b';
            if (card.type === 'initiator') return 'card-c';
            if (card.type === 'receiver') return 'card-d';
            if (/发起|initiator|发送/.test(card.text)) return 'card-c';
            if (/接收|receiver|收到/.test(card.text)) return 'card-d';
            return 'card-b';
        }

        function renderReasoningCards() {
            const waterfall = document.getElementById('reasoning-waterfall');
            if (!waterfall) return;
            waterfall.innerHTML = state.reasoningCards.map(card => `
                <div class="reasoning-card ${getReasoningCardClass(card)}">
                    <div class="reasoning-card-meta">${card.time}${card.round ? ` · 第 ${card.round} 轮` : ''} · ${card.type}</div>
                    <div class="reasoning-card-text">${card.text}</div>
                </div>
            `).join('');
            waterfall.scrollTop = waterfall.scrollHeight;
        }

        function downloadJson(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        function toggleRightPanel() {
            state.ui.rightPanelCollapsed = !state.ui.rightPanelCollapsed;
            render();
        }

        function toggleSimulationPanel() {
            state.ui.simulationCollapsed = !state.ui.simulationCollapsed;
            render();
        }
        
        async function extractGraph() {
            if (!state.inputText.trim()) { addLog('请输入文本内容', 'info'); return; }
            state.isBuilding = true; state.buildStep = 'extract';
            render();
            addLog('开始构建知识图谱...', 'info');
            
            const prompt = `从以下文本提取知识图谱实体和关系。请严格按照以下类型分类，仅仅返回JSON格式：

【实体类型 - 节点类别】
- 人物：具体的人物个体（如：林薇、陈默、苏晴等）
- MBTI类型：性格心理指标（如：INFP、ESTJ等）
- 星座：占星分类（如：双鱼座、天蝎座）
- 职业：具体的职位或行业（如：自由插画师、项目经理、大学教授等）
- 学历：受教育水平（如：硕士、本科）
- 专业：学习的领域（如：美术教育、土木工程）
- 家庭氛围：对原生家庭环境的描述（如：高知开放、传统务实）
- 资产/财务：具体的资产形式（如：存款、房产、贷款房）
- 价值观/观点：包括消费观，金钱观，生育意愿等抽象态度
- 压力与焦虑：职业焦虑或工作压力源（如：AI替代、晋升瓶颈）
- 休闲方式：个人爱好与生活习惯（如：看展、打篮球）
- 核心需求：深层心理诉求（如：情感深度、安全感）
- 地点：涉及的地域（如：云南、老家）
- 关系事件：交往过程中的关键节点（如：共同旅行、公益墙绘）
- 心理状态/创伤：过往经历留下的心理印记（如：PUA经历、恐惧冲突）

【关系类型 - 边语义】
核心社交关系：
- [情侣]：人物 ↔ 人物
- [密友]：人物 → 人物
- [父子/父女/母女]：人物 → 人物
- [亲戚]：人物 → 人物（如：表姐、舅舅）
- [同事]：人物 ↔ 人物
- [夫妻]：人物 ↔ 人物
- [前任]：人物 → 人物/群体
属性映射关系：
- [性格为]：人物 → MBTI类型
- [属于星座]：人物 → 星座
- [职业为]：人物 → 职业
- [最高学历为]：人物 → 学历
- [主修专业]：人物 → 专业
- [成长于]：人物 → 家庭氛围
- [持有资产]：人物 → 资产/财务

        async function reviewAndOptimize(customPrompt = '') {
            addLog('开始审阅优化...', 'processing');
            state.buildStep = 'review';
            
            const entities = state.graphData.nodes;
            const relations = state.graphData.links;
            
            const connectedIds = new Set();
            relations.forEach(r => { connectedIds.add(r.source); connectedIds.add(r.target); });
            const isolatedEntities = entities.filter(e => !connectedIds.has(e.id));
            
            const defaultPrompt = `你是一个知识图谱审阅优化助手。请对已提取的知识图谱进行审阅和优化。

【实体类型】人物、MBTI类型、星座、职业、学历、专业、家庭氛围、资产/财务、价值观/观点、压力与焦虑、休闲方式、核心需求、地点、关系事件、心理状态/创伤

【关系类型】情侣、密友、父子/父女/母女、亲戚、夫妻、前任、性格为、属于星座、职业为、最高学历为、主修专业、成长于、持有资产、持有观点、面临压力、爱好是、渴求、参与事件、发生地、曾遭遇、关注/干预、推荐/建议

- 实体: ${JSON.stringify(entities.map(e => ({id: e.id, name: e.name, type: e.type, description: e.description})))}
- 关系: ${JSON.stringify(relations.map(r => ({source: r.source, target: r.target, relation: r.relation})))}
- 孤立实体(无连接): ${JSON.stringify(isolatedEntities.map(e => ({name: e.name, type: e.type})))}

请进行以下优化：
1. 更正错误：检查实体类型是否正确、关系是否合理
2. 消灭信息孤岛：为孤立实体推断可能的关系
3. 补全信息：完善实体的description描述
4. 保持现有描述信息不被丢失

特别注意：仅仅返回json信息，不要有其他内容。
另外，请注意：`;

            const reviewPrompt = customPrompt 
                ? `${defaultPrompt}\n\n${customPrompt}`
                : defaultPrompt;
            
            try {
                const result = await callLLM(reviewPrompt);
                if (!result) { addLog('审阅优化失败', 'warning'); return; }
                
                const jsonStr = result.match(/\{[\s\S]*\}/)?.[0] || '{}';
                const parsed = JSON.parse(jsonStr);
                
                if (parsed.entities && parsed.entities.length > 0) {
                    const oldCount = state.graphData.nodes.length;
                    state.graphData.nodes = parsed.entities.map((e, i) => ({ 
                        id: i + 1, 
                        name: e.name, 
                        type: e.type,
                        description: e.description || ''
                    }));
                    
                    const idMap = {};
                    state.graphData.nodes.forEach((e, i) => { idMap[e.name] = i + 1; });
                    
                    state.graphData.links = (parsed.relations || []).map(r => ({
                        source: idMap[r.source] || r.source,
                        target: idMap[r.target] || r.target,
                        relation: r.relation
                    })).filter(r => r.source && r.target);
                    
                    state.entityTypes = [...new Set(state.graphData.nodes.map(e => e.type))];
                    state.relationTypes = [...new Set(state.graphData.links.map(r => r.relation).filter(Boolean))];
                    state.stats = { 
                        entities: state.graphData.nodes.length, 
                        relations: state.graphData.links.length, 
                        schemas: state.entityTypes.length + state.relationTypes.length 
                    };
                    
                    addLog(`优化完成，实体 ${oldCount} → ${state.graphData.nodes.length}`, 'success');
                }
                
                if (parsed.optimizations && parsed.optimizations.length > 0) {
                    parsed.optimizations.forEach(opt => {
                        addLog(`[优化] ${opt.description}`, 'warning');
                    });
                }
                
                addLog('审阅优化完成', 'success');
                
            } catch (e) { addLog('审阅优化出错: ' + e.message, 'warning'); }
        }

        function importGraph(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (data.entities && data.relations) {
                        // 重新编号
                        const idMap = {};
                        state.graphData.nodes = data.entities.map((e, i) => {
                            idMap[e.id] = i + 1;
                            return { id: i + 1, name: e.name, type: e.type, description: e.description || '' };
                        });
                        
                        state.graphData.links = data.relations.map(r => ({
                            source: idMap[r.source] || r.source,
                            target: idMap[r.target] || r.target,
                            relation: r.relation
                        })).filter(r => r.source && r.target);
                        
                        state.entityTypes = [...new Set(state.graphData.nodes.map(e => e.type))];
                        state.relationTypes = [...new Set(state.graphData.links.map(r => r.relation).filter(Boolean))];
                        state.stats = { 
                            entities: state.graphData.nodes.length, 
                            relations: state.graphData.links.length, 
                            schemas: state.entityTypes.length + state.relationTypes.length 
                        };
                        
                        addLog(`导入成功：${state.graphData.nodes.length} 个实体，${state.graphData.links.length} 个关系`, 'success');
                        render();
                        setTimeout(renderGraph, 100);
                    } else {
                        addLog('文件格式不正确', 'error');
                    }
                } catch (err) {
                    addLog('解析文件失败: ' + err.message, 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        
        // 显示实体详情
        function showEntityDetail(entity) {
            state.selectedEntity = entity;
            
            // 查找相关关系
            const relations = state.graphData.links.filter(r => r.source === entity.id || r.target === entity.id);
            const relatedEntities = {};
            relations.forEach(r => {
                const otherId = r.source === entity.id ? r.target : r.source;
                const other = state.graphData.nodes.find(n => n.id === otherId);
                if (other) {
                    if (!relatedEntities[r.relation]) relatedEntities[r.relation] = [];
                    relatedEntities[r.relation].push(other);
                }
            });
            
            let relationsHtml = '';
            for (const [rel, ents] of Object.entries(relatedEntities)) {
                relationsHtml += `<div class="entity-detail-relations"><h4>${rel}</h4>${ents.map(e => `<div class="entity-detail-relation">→ ${e.name} (${e.type})</div>`).join('')}</div>`;
            }
            
            const detailHtml = `
                <div class="entity-detail show" id="entity-detail">
                    <div class="entity-detail-header">
                        <span class="entity-detail-name">${entity.name}</span>
                        <span class="entity-detail-close" onclick="hideEntityDetail()">×</span>
                    </div>
                    <span class="entity-detail-type">${entity.type}</span>
                    <div class="entity-detail-desc">${entity.description || '暂无描述信息'}</div>

            const graphArea = document.getElementById('graph-area');

        async function runSandboxSimulation() {
            if (!window.runMultiAgentRoutingDemo) { addLog('多智能体模块未加载', 'error'); return; }
            if (state.graphData.nodes.length === 0) { addLog('请先构建或导入知识图谱', 'info'); return; }
            if (!state.simConfig.envReady) { addLog('请先点击“构建推演环境”', 'warning'); return; }

            const folderName = getSimRunFolderName();
            state.currentSimRun = {
                folderName,
                startedAt: new Date().toISOString(),
                rounds: Number(state.simConfig.rounds) || 1,
                simulationFiles: [],
                kgFiles: []
            };
            state.reasoningCards = [];
            state.roundRecords = [];

            addLog(`开始执行图谱驱动的多智能体推演，输出目录：${folderName}`, 'processing');
            pushReasoningCard(`推演开始，目录：${folderName}`, null, 'system');
            render();

            const result = await window.runMultiAgentRoutingDemo({
                graphData: state.graphData,
                llm: callLLM,
                logger: (msg) => {
                    addLog(msg, 'info');
                    const roundMatch = msg.match(/第\s*(\d+)\s*轮/);
                    pushReasoningCard(msg, roundMatch ? Number(roundMatch[1]) : null, 'trace');
                },
                rounds: Number(state.simConfig.rounds) || 1,
                duration: Number(state.simConfig.duration) || 30,
                customEvents: parseCustomEvents(state.simConfig.eventsInput),
                onRoundComplete: ({ round, graphData, roundEvents = [] }) => {
                    state.graphData = graphData;
                    updateStats(graphData);

                    const simFile = `${folderName}/simulation_round_${round}.json`;
                    const kgFile = `${folderName}/knowledge_graph_round_${round}.json`;
                    const roundRecord = createRoundRecord(round, roundEvents, graphData);
                    state.roundRecords.push(roundRecord);
                    state.currentSimRun.simulationFiles.push({ file: simFile, content: roundRecord });
                    state.currentSimRun.kgFiles.push({ file: kgFile, content: graphData });

                    downloadJson(roundRecord, `${folderName.replace('/', '_')}_simulation_round_${round}.json`);
                    downloadJson(graphData, `${folderName.replace('/', '_')}_knowledge_graph_round_${round}.json`);

                    pushReasoningCard(`第 ${round} 轮完成并已保存：${simFile} 与 ${kgFile}`, round, 'round');
                    roundEvents.forEach((evt, idx) => {
                        if (evt.initiator_id) {
                            pushReasoningCard(`事件${idx + 1} 发起方：${evt.initiator_id} · ${evt.action?.external_behavior || '无外显行为'}`, round, 'initiator');
                        }
                        if (Array.isArray(evt.receiver_ids) && evt.receiver_ids.length > 0) {
                            pushReasoningCard(`事件${idx + 1} 接收方：${evt.receiver_ids.join('、')}`, round, 'receiver');
                        }
                    });
                    addLog(`第 ${round} 轮结束，知识图谱已更新并生成轮次文件`, 'success');
                    render();
                }
            });
            if (result) {
                state.graphData = result.graphData || state.graphData;
                updateStats(state.graphData);
                render();
            }
        }

        function parseCustomEvents(text) {
            return (text || '')
                .split('\n')
                .map(line => line.trim())
                .filter(Boolean)
                .map((line, idx) => {
                    const [timePart, ...eventParts] = line.split(':');
                    const hasTime = eventParts.length > 0;
                    const eventText = hasTime ? eventParts.join(':').trim() : timePart.trim();
                    const timeNum = hasTime ? Number(timePart.trim()) : idx + 1;
                    return {
                        time: Number.isFinite(timeNum) && timeNum > 0 ? timeNum : idx + 1,
                        text: eventText || `用户事件${idx + 1}`
                    };
                });
        }

        function recommendSimulationConfig() {
            const eventNodes = state.graphData.nodes.filter(n => n.type === '关系事件');
            const people = state.graphData.nodes.filter(n => n.type === '人物');
            const relationCount = state.graphData.links.filter(l => l.relation === '情侣' || l.relation === '密友' || l.relation === '同事').length;

            const recommendedRounds = Math.max(2, Math.min(6, Math.ceil((eventNodes.length + relationCount) / 2) || 2));
            const recommendedDuration = Math.max(20, Math.min(180, people.length * 10 || 30));
            const keyEvents = eventNodes.slice(0, 5).map((n, idx) => `${idx + 1}:${n.name}`);

            state.simConfig.recommendedRounds = recommendedRounds;
            state.simConfig.recommendedDuration = recommendedDuration;
            state.simConfig.recommendedEvents = keyEvents;

            if (!state.simConfig.eventsInput.trim()) {
                state.simConfig.eventsInput = keyEvents.join('\n');
            }
            state.simConfig.rounds = recommendedRounds;
            state.simConfig.duration = recommendedDuration;
        }

        function renderGraph() {
            const container = document.getElementById('graph-area');
            const svg = d3.select('#graph-svg');
            const width = container.clientWidth, height = container.clientHeight;
            svg.attr('width', width).attr('height', height).selectAll('*').remove();
            
            // 移除旧的详情面板
            const oldDetail = document.getElementById('entity-detail');
            if (oldDetail) oldDetail.remove();
            
            if (state.graphData.nodes.length === 0) return;
            
            const g = svg.append('g');
            svg.call(d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform)));
            
            const nodes = state.graphData.nodes.map(n => ({ ...n }));
            const links = state.graphData.links.map(l => ({
                source: nodes.find(n => n.id === l.source),
                target: nodes.find(n => n.id === l.target),
                relation: l.relation
            })).filter(l => l.source && l.target);
            
            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(120))
                .force('charge', d3.forceManyBody().strength(-400))
                .force('center', d3.forceCenter(width/2, height/2))
                .force('collision', d3.forceCollide().radius(34));
            
            g.append('g').selectAll('line').data(links).enter().append('line')
                .attr('stroke', d => relationColors[d.relation] || '#555').attr('stroke-width', 2).attr('stroke-opacity', 0.6);
            
            g.append('g').selectAll('text.link-label').data(links).enter().append('text')
                .attr('class', 'link-label').text(d => d.relation).attr('font-size', 9).attr('fill', '#666');
            
            const node = g.append('g').selectAll('g').data(nodes).enter().append('g')
                .style('cursor', 'pointer')
                .on('click', (event, d) => showEntityDetail(d))
                .call(d3.drag()
                    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));
            
            node.append('circle').attr('r', showType ? 17 : 12)
                .attr('fill', d => entityTypeColors[typeGroups[d.type] || '其他'] || '#b2dfdb').attr('stroke', '#666').attr('stroke-width', 2);
            
            node.append('text').text(d => d.name.length > 6 ? d.name.substring(0, 6) + '...' : d.name)
                .attr('font-size', 10).attr('fill', '#333').attr('text-anchor', 'middle').attr('dy', 40);
            
            if (showType) {
                node.append('text').text(d => d.type).attr('font-size', 8).attr('fill', '#666').attr('text-anchor', 'middle').attr('dy', 4);
            }
            
            simulation.on('tick', () => {
                g.selectAll('line').attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                g.selectAll('text.link-label').attr('x', d => (d.source.x + d.target.x) / 2).attr('y', d => (d.source.y + d.target.y) / 2);
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }

                        <div class="sim-round-title">第 ${item.round} 轮 · ${item.events.length} 个事件</div>
                        ${item.events.slice(0, 3).map(evt => `<div class="sim-round-item">• ${evt.dialogue || '（无外显对话）'}</div>`).join('')}
                    </div>
                `).join('')
                : '<div class="sim-hint">尚未开始推演</div>';
            const runInfo = state.currentSimRun
                ? `<div class="sim-hint">当前目录：<b>${state.currentSimRun.folderName}</b></div>`
                : '<div class="sim-hint">完成推演后会生成带时间戳的目录与轮次文件映射</div>';
            
            app.innerHTML = `
                <nav class="top-navbar"><div class="window-controls"><span class="window-dot red"></span><span class="window-dot yellow"></span><span class="window-dot green"></span></div><div class="logo"><span>星演</span></div></nav>
                <div class="main-container">
                    <div class="left-sidebar">
                        <div class="input-section">
                            <label class="form-label">输入文本内容：</label>
                            <textarea id="input-text" class="form-textarea" placeholder="请输入需要分析的文本...">${state.inputText}</textarea>
                            <button class="btn-build" onclick="extractGraph()" ${state.isBuilding?'disabled':''}>${btnText}</button>
                            <div class="btn-row">
                                <button class="btn-build btn-build-sm btn-example" onclick="loadExample()" ${state.isBuilding?'disabled':''}>📋 示例</button>
                                <button class="btn-build btn-build-sm btn-import" onclick="triggerImport()">📥 导入</button>
                                <button class="btn-build btn-build-sm btn-export" onclick="exportGraph()">📤 导出</button>
                            </div>
                        </div>
                        <div class="sim-section">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <label class="form-label" style="margin:0">推演环境配置：</label>
                                <button class="btn-collapse" style="width:auto;padding:4px 8px" onclick="toggleSimulationPanel()">${state.ui.simulationCollapsed ? '展开推演内容' : '折叠推演内容'}</button>
                            </div>
                            ${state.ui.simulationCollapsed ? '' : `
                                <button class="btn-build" onclick="buildSimulationEnvironment()" ${state.isBuilding?'disabled':''}>🏗️ 构建推演环境</button>
                                <div class="sim-grid">
                                    <input class="sim-input" type="number" min="1" value="${state.simConfig.rounds}" onchange="onSimConfigInput('rounds', this.value)" ${!state.simConfig.envReady?'disabled':''} placeholder="轮次">
                                    <input class="sim-input" type="number" min="5" value="${state.simConfig.duration}" onchange="onSimConfigInput('duration', this.value)" ${!state.simConfig.envReady?'disabled':''} placeholder="时长(min)">
                                </div>
                                <div class="sim-hint">事件输入格式：<b>轮次:事件描述</b>，例如 <b>2:发生争执</b></div>
                                <textarea class="sim-events" onchange="onSimConfigInput('eventsInput', this.value)" ${!state.simConfig.envReady?'disabled':''}>${state.simConfig.eventsInput}</textarea>
                                <button class="btn-build" style="margin-top:8px" onclick="runSandboxSimulation()" ${!state.simConfig.envReady?'disabled':''}>▶ 推演</button>
                                <button class="btn-build" style="margin-top:8px;background:#2c2c2c" onclick="exportSimulationPackage()">📦 导出完整推演包</button>
                                ${runInfo}
                                <div class="sim-round-list">${roundCardsHtml}</div>
                                <div class="recommend-list">
                                    <div class="sim-hint">系统推荐：轮次 ${state.simConfig.recommendedRounds}，时长 ${state.simConfig.recommendedDuration} 分钟</div>
                                    <ul>${state.simConfig.recommendedEvents.map(item => `<li>${item}</li>`).join('') || '<li>构建环境后自动生成关键事件</li>'}</ul>
                                </div>
                            `}
                        </div>
                        <div class="prompt-section">
                            <label class="form-label">自定义优化提示词：</label>
                            <textarea id="custom-prompt" class="prompt-textarea" placeholder="额外优化要求...">${state.customPrompt}</textarea>
                            <button class="btn-build btn-optimize" onclick="runOptimization()" ${state.isBuilding?'disabled':''}>✨ 重新优化</button>
                        </div>
                    </div>
                    <div class="graph-container">
                        <div class="graph-header">
                            <span class="graph-title">🖥️ 星演可视化</span>
                            <div class="graph-actions">
                                <button class="btn-icon" onclick="extractGraph()" ${state.isBuilding?'disabled':''}>🔄 刷新</button>
                                <button class="btn-icon" onclick="toggleType()">${showType?'隐类型':'显类型'}</button>
                            </div>
                        </div>
                        <div class="graph-area" id="graph-area">
                            <svg id="graph-svg"></svg>
                            ${state.graphData.nodes.length === 0 ? '<div class="graph-loading"><div style="font-size:48px;margin-bottom:20px">🕸️</div><p>请输入文本构建知识图谱</p></div>' : ''}
                            ${legendHtml ? `<div class="legend">${legendHtml}</div>` : ''}
                        </div>
                    </div>
                    <div class="right-panel ${state.ui.rightPanelCollapsed ? 'collapsed' : ''}">
                        <div class="collapse-bar"><button class="btn-collapse" onclick="toggleRightPanel()">${state.ui.rightPanelCollapsed ? '⟨' : '⟩ 折叠右侧'}</button></div>
                        ${state.ui.rightPanelCollapsed ? '' : `
                            <div class="panel-section">
                                <div class="panel-title">📊 统计信息</div>
                                <div class="stats-grid">
                                    <div class="stat-card"><div class="stat-value">${state.stats.entities}</div><div class="stat-label">实体</div></div>
                                    <div class="stat-card"><div class="stat-value">${state.stats.relations}</div><div class="stat-label">关系</div></div>
                                    <div class="stat-card"><div class="stat-value">${state.stats.schemas}</div><div class="stat-label">类型</div></div>
                                </div>
                            </div>
                            <div class="panel-section"><div class="panel-title">🏷️ 实体类型</div><div class="tag-container">${et}</div></div>
                            <div class="panel-section"><div class="panel-title">🔗 关系类型</div><div class="tag-container">${rt}</div></div>
                            <div class="log-panel">
                                <div class="log-header"><span class="log-title">📝 系统日志</span></div>
                                <div class="log-content" id="log-content">${state.logs.map(l => `<div class="log-entry ${l.type}"><span class="time">${l.time}</span><span class="message">${l.message}</span></div>`).join('')}</div>
                            </div>
                        `}
                    </div>
                    <div class="reasoning-panel">
                        <div class="reasoning-header">
                            <span class="panel-title" style="margin:0">推演过程</span>
                            <span style="font-size:11px;color:#666">推演过程</span>
                        </div>
                        <div class="reasoning-waterfall" id="reasoning-waterfall"></div>
                    </div>
                </div>
            `;
            
            document.getElementById('input-text')?.addEventListener('input', e => state.inputText = e.target.value);
            document.getElementById('custom-prompt')?.addEventListener('input', e => state.customPrompt = e.target.value);
            document.getElementById('import-file')?.addEventListener('change', importGraph);
            renderReasoningCards();
            
            if (state.graphData.nodes.length > 0 && !state.isBuilding) {
                setTimeout(renderGraph, 100);
            }
        }
        
        function toggleType() { showType = !showType; render(); if (state.graphData.nodes.length > 0) setTimeout(renderGraph, 100); }
        
        document.addEventListener('DOMContentLoaded', () => { render(); window.addEventListener('resize', () => state.graphData.nodes.length && renderGraph()); });
        window.extractGraph = extractGraph; 
        window.loadExample = loadExample; 
        window.toggleType = toggleType; 
        window.runOptimization = runOptimization;
        window.exportGraph = exportGraph;
        window.triggerImport = triggerImport;
        window.showEntityDetail = showEntityDetail;
        window.hideEntityDetail = hideEntityDetail;
        window.runSandboxSimulation = runSandboxSimulation;
        window.buildSimulationEnvironment = buildSimulationEnvironment;
        window.onSimConfigInput = onSimConfigInput;
        window.toggleRightPanel = toggleRightPanel;
        window.toggleSimulationPanel = toggleSimulationPanel;
        window.exportSimulationPackage = exportSimulationPackage;
    </script>
    <script src="multi_agent_sim.js"></script>
</body>
</html>
